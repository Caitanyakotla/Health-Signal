# =========================================================
# Kyverno Policy 2: Require Resource Limits
#
# What it does:
# Every container in healthsignal namespace MUST define
# CPU and memory limits.
#
# Why it matters in MedTech:
# Without resource limits, one misbehaving container can
# consume all cluster resources — taking down other services.
# In a health platform, this could mean your ML inference
# service becomes unavailable when patients need it.
#
# Also required for HPA (HorizontalPodAutoscaler) to work
# correctly — which you already have in HealthSignal.
#
# What it blocks:
# containers:
#   - name: predictor
#     image: healthsignal:latest
#     # no resources defined ← THIS IS BLOCKED
#
# What it allows:
# containers:
#   - name: predictor
#     image: healthsignal:latest
#     resources:
#       limits:
#         memory: "512Mi"   ← REQUIRED
#         cpu: "500m"       ← REQUIRED
#       requests:
#         memory: "256Mi"
#         cpu: "250m"
# =========================================================

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      All containers must define CPU and memory limits
      to prevent resource exhaustion in the healthsignal
      platform.
spec:

  validationFailureAction: audit

  background: true

  rules:

    - name: require-resource-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - healthsignal

      validate:
        message: >-
          Resource limits are required for all containers in healthsignal.
          Please define resources.limits.memory and resources.limits.cpu.

        pattern:
          spec:
            containers:
              - name: "*"
                resources:
                  limits:
                    memory: "?*"   # must be set to any value
                    cpu: "?*"      # must be set to any value