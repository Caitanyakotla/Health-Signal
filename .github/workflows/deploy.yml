# =========================================================
# Security Scanning Pipeline — HealthSignal
#
# This pipeline runs ONLY security tools:
# 1. Gitleaks  — secret scanning
# 2. Bandit    — Python SAST
# 3. Trivy     — container vulnerability scan
# 4. Syft      — SBOM generation (Software Bill of Materials)
#
# No ML training, no Docker push, no AWS, no EKS needed.
# =========================================================
 
name: Security Scan Only
 
# ---------------------------------------------------------
# Trigger conditions
# ---------------------------------------------------------
on:
 
  push:
    branches: [main, dev]
 
  pull_request:
    branches: [main]
 
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
 
# =========================================================
# JOBS
# =========================================================
jobs:
 
  # =======================================================
  # JOB 1: SECRET SCANNING
  # Scans code and full git history for leaked secrets
  # =======================================================
  secret-scan:
 
    name: Secret Scanning (Gitleaks)
 
    runs-on: ubuntu-latest
 
    steps:
 
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
  # =======================================================
  # JOB 2: SAST — STATIC CODE ANALYSIS
  # Scans Python code for security issues
  # =======================================================
  sast-scan:
 
    name: SAST Code Scan (Bandit)
 
    runs-on: ubuntu-latest
 
    steps:
 
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
 
      - name: Install Bandit
        run: pip install bandit
 
      - name: Run Bandit (log output)
        run: bandit -r ./app -ll
        continue-on-error: true
 
      - name: Run Bandit (JSON report)
        run: bandit -r ./app -ll -f json -o bandit-report.json
        continue-on-error: true
 
      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
 
  # =======================================================
  # JOB 3: CONTAINER VULNERABILITY SCAN
  # Builds Docker image locally and scans for CVEs
  # No push, no ECR, no AWS needed
  # =======================================================
  container-scan:
 
    name: Container Scan (Trivy)
 
    runs-on: ubuntu-latest
 
    steps:
 
      - uses: actions/checkout@v4
 
      - name: Build Docker image (local only)
        run: docker build -t healthsignal:scan .
 
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: healthsignal:scan
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH,MEDIUM'
          output: trivy-report.txt
 
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-container-report
          path: trivy-report.txt
 
  # =======================================================
  # JOB 4: SBOM GENERATION (NEW)
  #
  # SBOM = Software Bill of Materials
  # Think of it as an ingredients list for your container.
  # Lists every package, library, version inside your image.
  #
  # Why it matters in MedTech:
  # If a critical CVE is found tomorrow, security teams
  # check the SBOM to instantly know which products
  # are affected — without scanning everything manually.
  #
  # Two formats generated:
  # - SPDX JSON  → industry standard, used in compliance
  # - CycloneDX  → preferred in healthcare/regulated sectors
  # =======================================================
  sbom-generate:
 
    name: SBOM Generation (Syft)
 
    runs-on: ubuntu-latest
 
    steps:
 
      - uses: actions/checkout@v4
 
      # Build image locally — no push, no AWS needed
      - name: Build Docker image (local only)
        run: docker build -t healthsignal:sbom .
 
      # Install Syft — the SBOM generation tool by Anchore
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
 
      # Generate SBOM in SPDX format
      # SPDX = Software Package Data Exchange
      # Industry standard — used in EU Cyber Resilience Act compliance
      - name: Generate SBOM (SPDX format)
        run: |
          syft healthsignal:sbom -o spdx-json > healthsignal-sbom.spdx.json
          echo "SBOM generated successfully"
          echo "Total packages found:"
          cat healthsignal-sbom.spdx.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          packages = data.get('packages', [])
          print(f'  {len(packages)} packages in image')
          "
 
      # Generate SBOM in CycloneDX format
      # Preferred format in healthcare and regulated sectors
      - name: Generate SBOM (CycloneDX format)
        run: |
          syft healthsignal:sbom -o cyclonedx-json > healthsignal-sbom.cyclonedx.json
          echo "CycloneDX SBOM generated successfully"
 
      # Print human readable summary in logs
      - name: Print SBOM Summary
        run: |
          echo "================================================"
          echo "         HEALTHSIGNAL SBOM SUMMARY              "
          echo "================================================"
          syft healthsignal:sbom -o table
          echo "================================================"
 
      # Upload both SBOM files — downloadable from Actions UI
      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: healthsignal-sbom
          path: |
            healthsignal-sbom.spdx.json
            healthsignal-sbom.cyclonedx.json
 
  # =======================================================
  # JOB 5: SECURITY SUMMARY
  # Runs after all scans complete
  # Prints combined results in one place
  # =======================================================
  security-summary:
 
    name: Security Summary
 
    runs-on: ubuntu-latest
 
    needs: [secret-scan, sast-scan, container-scan, sbom-generate]
 
    if: always()
 
    steps:
 
      - name: Print Summary
        run: |
          echo "================================================"
          echo "      HEALTHSIGNAL SECURITY SCAN SUMMARY        "
          echo "================================================"
          echo ""
          echo "Secret Scan  (Gitleaks) : ${{ needs.secret-scan.result }}"
          echo "SAST Scan    (Bandit)   : ${{ needs.sast-scan.result }}"
          echo "Container    (Trivy)    : ${{ needs.container-scan.result }}"
          echo "SBOM         (Syft)     : ${{ needs.sbom-generate.result }}"
          echo ""
          echo "Artifacts available for download:"
          echo "  - bandit-security-report   (SAST findings)"
          echo "  - trivy-container-report   (CVE findings)"
          echo "  - healthsignal-sbom        (SPDX + CycloneDX)"
          echo ""
          echo "================================================"
