version: '3.8'

services:

  # ── ML Prediction API ──────────────────────────────────────────────────────
  predictor:
    build: .
    container_name: healthsignal-predictor
    ports:
      - "8000:8000"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - healthsignal-net

  # ── ElasticSearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.io/docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: healthsignal-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - healthsignal-net

  # ── Kibana ─────────────────────────────────────────────────────────────────
  kibana:
    image: docker.io/docker.elastic.co/kibana/kibana:8.12.0
    container_name: healthsignal-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - healthsignal-net

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: healthsignal-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - healthsignal-net

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: healthsignal-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/healthsignal.json
      - ./monitoring/grafana-dashboard-config.yml:/etc/grafana/provisioning/dashboards/dashboard.yml
    depends_on:
      - prometheus
    networks:
      - healthsignal-net

volumes:
  es-data:
  grafana-data:

networks:
  healthsignal-net:
    driver: bridge
